<script>
        function toggleActive(target) {
            const betterwareBtn = document.getElementById('toggle-betterware');
            const tiendaBtn = document.getElementById('toggle-tienda');
            
            if (target === 'betterware') {
                betterwareBtn.classList.add('bg-success-stock', 'text-white', 'font-bold');
                betterwareBtn.classList.remove('text-on-surface-variant');
                betterwareBtn.innerHTML = 'Betterware <span class="block w-2 h-2 rounded-full bg-white"></span>';
                
                tiendaBtn.classList.remove('bg-success-stock', 'text-white', 'font-bold');
                tiendaBtn.classList.add('text-on-surface-variant');
                tiendaBtn.innerHTML = 'Tienda';
            } else {
                tiendaBtn.classList.add('bg-success-stock', 'text-white', 'font-bold');
                tiendaBtn.classList.remove('text-on-surface-variant');
                tiendaBtn.innerHTML = 'Tienda <span class="block w-2 h-2 rounded-full bg-white"></span>';
                
                betterwareBtn.classList.remove('bg-success-stock', 'text-white', 'font-bold');
                betterwareBtn.classList.add('text-on-surface-variant');
                betterwareBtn.innerHTML = 'Betterware';
            }
