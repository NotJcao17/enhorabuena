<script>
        // Simulate carousel behavior
        const dots = document.querySelectorAll('.rounded-full.bg-outline-variant, .rounded-full.bg-primary');
        dots.forEach((dot, idx) => {
            dot.addEventListener('click', () => {
                dots.forEach(d => d.classList.replace('bg-primary', 'bg-outline-variant'));
                dot.classList.replace('bg-outline-variant', 'bg-primary');
            });
        });
    </script>
