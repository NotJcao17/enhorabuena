<script>
        // Micro-interaction for category chips
        const chips = document.querySelectorAll('.hide-scrollbar button');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => {
                    c.classList.remove('bg-primary-container', 'text-on-primary-container');
                    c.classList.add('bg-surface-container-highest', 'text-on-surface-variant');
                });
                chip.classList.add('bg-primary-container', 'text-on-primary-container');
                chip.classList.remove('bg-surface-container-highest', 'text-on-surface-variant');
            });
        });

        // Add a subtle parallax effect or reveal on scroll
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 10) {
                header.classList.add('shadow-md');
            } else {
                header.classList.remove('shadow-md');
            }
        });
    </script>
