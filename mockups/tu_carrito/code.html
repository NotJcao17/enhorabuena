<script>
        // Micro-interaction for item removal simulation
        document.querySelectorAll('button .material-symbols-outlined').forEach(icon => {
            if (icon.textContent === 'delete') {
                icon.closest('button').addEventListener('click', function() {
                    const card = this.closest('.bg-surface-container-lowest');
                    card.style.transition = 'all 0.3s ease';
                    card.style.opacity = '0';
                    card.style.transform = 'translateX(50px)';
                    setTimeout(() => {
                        card.remove();
                        // Realistically here we would update the total, but this is a static prototype
                    }, 300);
                });
            }
        });

        // Hover effect script for product cards
        const cards = document.querySelectorAll('.bg-surface-container-lowest');
        cards.forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.classList.add('shadow-lg');
            });
            card.addEventListener('mouseleave', () => {
                card.classList.remove('shadow-lg');
            });
        });
    </script>
